      type: bearer
      token: '{{env.INTRALINKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: intralinks-splash-rest
    port: 8080
    description: REST adapter for Intralinks API — Splash. One Spectral-compliant resource per consumed operation, prefixed

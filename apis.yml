        type: JSONSchema
      - url: json-schema/custom-field.json
        type: JSONSchema
      - url: json-ld/intralinks-context.jsonld
        type: JSONLD
    description: >-
      The Intralinks API provides RESTful access to the Intralinks virtual data
      room platform, enabling programmatic management of workspaces (exchanges),
      documents, folders, groups, users, permissions, splash screens, and custom
      fields. Authentication uses OAuth 2.0 with authorization code and client
      credentials flows. The API supports secure document sharing, M&A due
      diligence workflows, and confidential business collaboration.
